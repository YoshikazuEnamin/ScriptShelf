<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>えなみん！の旅びより｜台本置き場</title>
<style>
  :root{
    --kinari:#F5EFE0; --gray:#D9D2C5; --shu:#C75B39; --green:#7A8B5A; --sumi:#3A3A3A;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;background:var(--kinari);color:var(--sumi);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    line-height:1.7;font-size:16px;padding-bottom:48px;
  }
  header{
    background:var(--shu);color:#fff;padding:22px 18px 18px;
    box-shadow:0 2px 10px rgba(58,58,58,.18);
  }
  header .ch{font-size:12px;letter-spacing:.22em;opacity:.9;margin:0 0 6px;}
  header h1{margin:0;font-size:22px;letter-spacing:.02em;}
  header .sub{font-size:12.5px;opacity:.92;margin-top:6px;}
  .wrap{max-width:720px;margin:0 auto;padding:16px 12px 0;}

  .status{
    background:#fff;border:1px solid var(--gray);border-radius:12px;padding:16px;margin-bottom:14px;
    font-size:14px;color:#6a665c;text-align:center;
  }
  .status.err{border-color:#e3b8a8;background:#fdf0eb;color:#a8431f;text-align:left;}
  .status code{background:#f2ede0;padding:1px 6px;border-radius:5px;font-size:12.5px;}

  a.card{
    display:block;text-decoration:none;color:inherit;
    background:#fff;border:1px solid var(--gray);border-radius:14px;
    padding:15px 16px;margin-bottom:12px;transition:box-shadow .15s, transform .05s;
  }
  a.card:hover{box-shadow:0 3px 14px rgba(58,58,58,.12);}
  a.card:active{transform:scale(.995);}
  .card .t{font-weight:800;font-size:16px;display:flex;align-items:center;gap:8px;}
  .card .t .arrow{margin-left:auto;color:var(--shu);flex:none;font-weight:900;}
  .card .s{font-size:12.5px;color:#6a665c;margin-top:5px;}
  .card .f{display:inline-block;margin-top:8px;font-size:11px;color:#8a8678;background:#f7f4ec;
    border-radius:6px;padding:2px 8px;}

  .count{font-size:12.5px;color:#8a8678;margin:2px 4px 12px;}

  /* カテゴリ見出し */
  .section{display:flex;align-items:center;gap:9px;margin:22px 4px 10px;}
  .section:first-of-type{margin-top:6px;}
  .section .lbl{font-weight:800;font-size:13px;padding:5px 13px;border-radius:999px;color:#fff;letter-spacing:.04em;}
  .section .lbl.now{background:var(--shu);}
  .section .lbl.wait{background:var(--green);}
  .section .lbl.done{background:var(--gray);color:#5c584d;}
  .section .n{font-size:12px;color:#8a8678;}
  /* カード上のカテゴリバッジ */
  .card .badge{flex:none;font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:999px;color:#fff;letter-spacing:.03em;}
  .card .badge.now{background:var(--shu);}
  .card .badge.wait{background:var(--green);}
  .card .badge.done{background:var(--gray);color:#5c584d;}
  footer{text-align:center;font-size:11.5px;color:#8a8678;padding:24px 16px 8px;}
  .spin{display:inline-block;width:16px;height:16px;border:3px solid var(--gray);
    border-top-color:var(--shu);border-radius:50%;animation:sp .8s linear infinite;vertical-align:-3px;margin-right:8px;}
  @keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<header>
  <p class="ch">えなみん！の旅びより</p>
  <h1>📁 台本置き場</h1>
  <div class="sub">行った日の撮影台本、まとめ ／ 行ってよかった！を集めてます</div>
</header>

<div class="wrap">
  <div class="count" id="count"></div>
  <div id="list"></div>
  <div class="status" id="status"><span class="spin"></span>台本を読み込み中…</div>
</div>

<footer>
  ※このページはリポジトリ内のHTMLを自動で一覧表示します。<br>
  えなみん！の旅びより
</footer>

<script>
  // ===== 設定（リポジトリが変わったらここだけ直す）=====
  const OWNER = "YoshikazuEnamin";
  const REPO  = "ScriptShelf";
  // ================================================

  const listEl   = document.getElementById('list');
  const statusEl = document.getElementById('status');
  const countEl  = document.getElementById('count');

  // 今日（時刻を0時に丸めて日付だけで比較）
  const today = new Date(); today.setHours(0,0,0,0);

  // ファイル名の先頭から撮影日を拾う（単日 YYYYMMDD ／ 範囲 YYYYMMDD~MMDD 等に対応）
  function parseDates(name){
    const m = name.match(/(\d{4})(\d{2})(\d{2})/);
    if(!m) return null;
    const y = +m[1], mo = +m[2], d = +m[3];
    const start = new Date(y, mo-1, d);
    let end = new Date(y, mo-1, d);
    // 「~」「〜」「-」に続く終了日（例：20260804~0807）
    const rest = name.slice(m.index + m[0].length);
    const rm = rest.match(/^\s*[~〜\-]\s*(\d{2,8})/);
    if(rm){
      const g = rm[1];
      if(g.length === 8)      end = new Date(+g.slice(0,4), +g.slice(4,6)-1, +g.slice(6,8));
      else if(g.length === 4) end = new Date(y, +g.slice(0,2)-1, +g.slice(2,4));
      else if(g.length === 2) end = new Date(y, mo-1, +g);
    }
    return { start, end };
  }

  // カテゴリ判定：撮影中(now)＝今日を含む／撮影待ち(wait)＝未来／撮影完了(done)＝過去
  function categorize(dates){
    if(!dates) return "done"; // 日付が読めないものは最後（撮影完了）へ
    if(dates.start <= today && today <= dates.end) return "now";
    if(dates.start > today) return "wait";
    return "done";
  }

  async function getTitle(fileName){
    // 各HTMLの <header h1> と <header .sub>、無ければ <title> を表示名に使う
    try{
      const res = await fetch(fileName, {cache:"no-store"});
      if(!res.ok) throw 0;
      const html = await res.text();
      const doc = new DOMParser().parseFromString(html, "text/html");
      const h1  = doc.querySelector('header h1');
      const sub = doc.querySelector('header .sub');
      const title = (h1 && h1.textContent.trim()) || (doc.title || fileName).trim();
      return { title, sub: sub ? sub.textContent.trim() : "" };
    }catch(e){
      return { title: fileName, sub: "" };
    }
  }

  async function main(){
    try{
      const api = `https://api.github.com/repos/${OWNER}/${REPO}/contents/`;
      const res = await fetch(api);
      if(!res.ok) throw new Error("GitHub API " + res.status);
      const files = await res.json();

      let htmls = files.filter(f =>
        f.type === "file" &&
        /\.html?$/i.test(f.name) &&
        f.name.toLowerCase() !== "index.html"
      );

      if(htmls.length === 0){
        statusEl.textContent = "まだ台本がありません。HTMLファイルをアップロードすると、ここに自動で並びます。";
        countEl.textContent = "";
        return;
      }

      const metas = await Promise.all(htmls.map(f => getTitle(f.name)));

      // 各台本に日付・カテゴリを付与
      const items = htmls.map((f, i) => {
        const dates = parseDates(f.name);
        return { f, meta: metas[i], dates, cat: categorize(dates) };
      });

      // カテゴリごとに仕分け
      const groups = { now: [], wait: [], done: [] };
      items.forEach(it => groups[it.cat].push(it));

      // 撮影中・撮影待ちは今日→未来へ（昇順）、撮影完了は新しい→古い（降順）
      const byStartAsc  = (a, b) => (a.dates ? a.dates.start : 0) - (b.dates ? b.dates.start : 0);
      const byStartDesc = (a, b) => (b.dates ? b.dates.start : 0) - (a.dates ? a.dates.start : 0);
      groups.now.sort(byStartAsc);
      groups.wait.sort(byStartAsc);
      groups.done.sort(byStartDesc);

      const SECTIONS = [
        { key:"now",  label:"撮影中" },
        { key:"wait", label:"撮影待ち" },
        { key:"done", label:"撮影完了" },
      ];

      const frag = document.createDocumentFragment();
      SECTIONS.forEach(sec => {
        const arr = groups[sec.key];
        if(arr.length === 0) return;

        const head = document.createElement('div');
        head.className = "section";
        head.innerHTML =
          '<span class="lbl ' + sec.key + '">' + sec.label + '</span>' +
          '<span class="n">' + arr.length + ' 本</span>';
        frag.appendChild(head);

        arr.forEach(it => {
          const a = document.createElement('a');
          a.className = "card";
          a.href = it.f.name;
          a.innerHTML =
            '<div class="t">' + escapeHtml(it.meta.title) +
              '<span class="badge ' + sec.key + '">' + sec.label + '</span>' +
              '<span class="arrow">›</span></div>' +
            (it.meta.sub ? '<div class="s">' + escapeHtml(it.meta.sub) + '</div>' : '') +
            '<span class="f">' + escapeHtml(it.f.name) + '</span>';
          frag.appendChild(a);
        });
      });

      listEl.appendChild(frag);
      statusEl.remove();
      countEl.textContent = htmls.length + " 本の台本";
    }catch(err){
      statusEl.className = "status err";
      statusEl.innerHTML =
        "読み込みに失敗しました（" + escapeHtml(String(err.message||err)) + "）。<br>" +
        "・リポジトリ名の設定（<code>OWNER</code> / <code>REPO</code>）が合っているか<br>" +
        "・少し時間をおいてリロード（GitHub APIは1時間あたりの回数制限あり）<br>" +
        "を確認してみてください。";
      countEl.textContent = "";
    }
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => (
      {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]
    ));
  }

  main();
</script>
</body>
</html>
